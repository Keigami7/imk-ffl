<DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kelola Stok - Toko Buku</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #4CAF50, #45a049, #2E7D32);
            min-height: 100vh;
            color: #333;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            margin-bottom: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            backdrop-filter: blur(10px);
        }

        .header h1 {
            color: #2E7D32;
            font-size: 2.8em;
            margin-bottom: 10px;
        }

        .header p {
            color: #666;
            font-size: 1.2em;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.95);
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 8px 30px rgba(0,0,0,0.1);
            backdrop-filter: blur(10px);
            transition: transform 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-number {
            font-size: 2.5em;
            font-weight: bold;
            color: #4CAF50;
            margin-bottom: 10px;
        }

        .action-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 30px;
        }

        .btn {
            padding: 15px 30px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .btn-primary {
            background: linear-gradient(135deg, #4CAF50, #45a049);
            color: white;
        }

        .btn-success {
            background: linear-gradient(135deg, #28a745, #20c997);
            color: white;
        }

        .btn-warning {
            background: linear-gradient(135deg, #ffc107, #e0a800);
            color: #333;
        }

        .btn-danger {
            background: linear-gradient(135deg, #dc3545, #c82333);
            color: white;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
        }

        /* Form Styles */
        .form-section {
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 20px;
            margin-bottom: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            backdrop-filter: blur(10px);
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #2E7D32;
            font-size: 1.1em;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #4CAF50;
            box-shadow: 0 0 0 3px rgba(76, 175, 80, 0.1);
        }

        /* Table */
        .table-container {
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            backdrop-filter: blur(10px);
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th, td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }

        th {
            background: linear-gradient(135deg, #4CAF50, #45a049);
            color: white;
            font-weight: 600;
            position: sticky;
            top: 0;
        }

        tr:hover {
            background: #f8f9fa;
        }

        .status-low {
            color: #dc3545;
            font-weight: bold;
        }

        .status-ok {
            color: #28a745;
            font-weight: bold;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
        }

        .modal-content {
            background: white;
            margin: 10% auto;
            padding: 30px;
            border-radius: 20px;
            width: 90%;
            max-width: 600px;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { transform: translateY(-50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .close {
            color: #aaa;
            float: right;
            font-size: 30px;
            font-weight: bold;
            cursor: pointer;
        }

        .close:hover {
            color: #2E7D32;
        }

        /* Notification */
        .notification {
            position: fixed;
            top: 30px;
            right: 30px;
            padding: 20px 25px;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            transform: translateX(400px);
            transition: transform 0.4s ease;
            z-index: 1001;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .notification.show {
            transform: translateX(0);
        }

        .notification.success { background: linear-gradient(135deg, #28a745, #20c997); }
        .notification.error { background: linear-gradient(135deg, #dc3545, #e74c3c); }
        .notification.warning { background: linear-gradient(135deg, #ffc107, #e0a800); }

        @media (max-width: 768px) {
            .form-grid { grid-template-columns: 1fr; }
            .action-buttons { flex-direction: column; align-items: center; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>📦 Kelola Stok Buku</h1>
            <p>Sistem Manajemen Inventori Toko Buku</p>
        </div>

        <!-- Stats -->
        <div class="stats-grid" id="statsGrid">
            <!-- Stats akan diisi oleh JavaScript -->
        </div>

        <!-- Action Buttons -->
        <div class="action-buttons">
            <button class="btn btn-primary" onclick="openAddBookModal()">
                ➕ Tambah Buku Baru
            </button>
            <button class="btn btn-success" onclick="openEditStockModal()">
                📝 Edit Stok
            </button>
            <button class="btn btn-warning" onclick="exportStock()">
                📊 Export Excel
            </button>
            <button class="btn btn-danger" onclick="clearLowStock()">
                🗑️ Hapus Stok 0
            </button>
        </div>

        <!-- Add Stock Form -->
        <div class="form-section">
            <h2>➕ Form Tambah Buku</h2>
            <form id="addBookForm" class="form-grid">
                <div class="form-group">
                    <label>📖 Judul Buku</label>
                    <input type="text" id="bookTitle" placeholder="Contoh: Algoritma Pemrograman" required>
                </div>
                <div class="form-group">
                    <label>✍️ Penulis</label>
                    <input type="text" id="bookAuthor" placeholder="Contoh: Budi Santoso" required>
                </div>
                <div class="form-group">
                    <label>💰 Harga (Rp)</label>
                    <input type="number" id="bookPrice" placeholder="85000" required>
                </div>
                <div class="form-group">
                    <label>📦 Stok Awal</label>
                    <input type="number" id="bookStock" placeholder="25" required>
                </div>
                <div class="form-group">
                    <label>🏷️ ISBN (Opsional)</label>
                    <input type="text" id="bookISBN" placeholder="978-602-xxx-xxx-x">
                </div>
                <div class="form-group">
                    <label>📑 Kategori</label>
                    <select id="bookCategory" required>
                        <option value="">Pilih Kategori</option>
                        <option value="Teknik">Teknik Informatika</option>
                        <option value="Matematika">Matematika</option>
                        <option value="Desain">Desain Grafis</option>
                        <option value="Umum">Umum</option>
                        <option value="Lainnya">Lainnya</option>
                    </select>
                </div>
                <div class="form-group" style="grid-column: 1 / -1;">
                    <label>📝 Deskripsi</label>
                    <textarea id="bookDesc" rows="3" placeholder="Deskripsi singkat buku..."></textarea>
                </div>
                <div style="grid-column: 1 / -1;">
                    <button type="submit" class="btn btn-success" style="width: 100%; padding: 18px;">
                        💾 SIMPAN BUKU BARU
                    </button>
                </div>
            </form>
        </div>

        <!-- Stock Table -->
        <div class="table-container">
            <h2>📋 Daftar Stok Buku</h2>
            <div style="margin-bottom: 20px;">
                <input type="text" id="searchStock" placeholder="🔍 Cari buku..." 
                       style="padding: 15px; border: 2px solid #ddd; border-radius: 10px; width: 300px; font-size: 16px;">
            </div>
            <table id="stockTable">
                <thead>
                    <tr>
                        <th>No</th>
                        <th>Judul</th>
                        <th>Penulis</th>
                        <th>Harga</th>
                        <th>Stok</th>
                        <th>Status</th>
                        <th>Kategori</th>
                        <th>Aksi</th>
                    </tr>
                </thead>
                <tbody id="stockTableBody">
                    <!-- Data akan diisi oleh JavaScript -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- Edit Stock Modal -->
    <div id="editStockModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('editStockModal')">&times;</span>
            <h2>📝 Edit Stok Buku</h2>
            <form id="editStockForm">
                <input type="hidden" id="editBookId">
                <div class="form-group">
                    <label>📖 Judul Buku</label>
                    <input type="text" id="editBookTitle" readonly>
                </div>
                <div class="form-group">
                    <label>📦 Stok Baru</label>
                    <input type="number" id="editBookStock" required min="0">
                </div>
                <div class="form-group">
                    <label>💰 Harga Baru (Rp)</label>
                    <input type="number" id="editBookPrice" required>
                </div>
                <button type="submit" class="btn btn-success" style="width: 100%;">💾 UPDATE STOK</button>
            </form>
        </div>
    </div>

    <!-- Notification -->
    <div id="notification" class="notification"></div>

    <script>
        // Data Books (integrasi dengan sistem kasir)
        let books = JSON.parse(localStorage.getItem('books')) || [
            { id: 1, title: "Algoritma & Pemrograman", author: "Budi Santoso", price: 85000, stock: 25, isbn: "", category: "Teknik", desc: "" },
            { id: 2, title: "Matematika Diskrit", author: "Sari Wulandari", price: 95000, stock: 15, isbn: "", category: "Matematika", desc: "" },
            { id: 3, title: "Desain Grafis Modern", author: "Ahmad Fauzi", price: 120000, stock: 8, isbn: "", category: "Desain", desc: "" }
        ];

        // Save to localStorage
        function saveBooks() {
            localStorage.setItem('books', JSON.stringify(books));
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            displayStockTable();
            updateStats();
            setupSearch();
        });

        // Display Stats
        function updateStats() {
            const totalBooks = books.reduce((sum, b) => sum + b.stock, 0);
            const lowStock = books.filter(b => b.stock <= 5 && b.stock > 0).length;
            const outOfStock = books.filter(b => b.stock === 0).length;
            const totalTypes = books.length;

            document.getElementById('statsGrid').innerHTML = `
                <div class="stat-card">
                    <div class="stat-number">${totalBooks}</div>
                    <div>Total Buku</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" style="color: ${lowStock > 0 ? '#ffc107' : '#28a745'}">${lowStock}</div>
                    <div>Stok Rendah</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" style="color: #dc3545;">${outOfStock}</div>
                    <div>Habis</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number">${totalTypes}</div>
                    <div>Jenis Buku</div>
                </div>
            `;
        }

        // Display Stock Table
        function displayStockTable(filteredBooks = books) {
            const tbody = document.getElementById('stockTableBody');
            tbody.innerHTML = filteredBooks.map((book, index) => {
                const status = book.stock === 0 ? '❌ HABIS' : 
                              book.stock <= 5 ? '⚠️ RENDAH' : '✅ OK';
                const statusClass = book.stock === 0 ? 'status-low' : 
                                   book.stock <= 5 ? 'status-low' : 'status-ok';
                
                return `
                    <tr>
                        <td>${index + 1}</td>
                        <td><strong>${book.title}</strong></td>
                        <td>${book.author}</td>
                        <td>${formatRupiah(book.price)}</td>
                        <td>
                            <strong style="color: ${book.stock <= 5 ? '#ffc107' : '#28a745'}">${book.stock}</strong>
                        </td>
                        <td><span class="${statusClass}">${status}</span></td>
                        <td>${book.category}</td>
                        <td>
                            <button class="btn btn-success" onclick="editStock(${book.id})" style="padding: 8px 15px; font-size: 12px;">
                                Edit
                            </button>
                            <button class="btn btn-danger" onclick="deleteBook(${book.id})" style="padding: 8px 15px; font-size: 12px;">
                                Hapus
                            </button>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        // Add New Book
        document.getElementById('addBookForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const newBook = {
                id: Date.now(),
                title: document.getElementById('bookTitle').value,
                author: document.getElementById('bookAuthor').value,
                price: parseInt(document.getElementById('bookPrice').value),
                stock: parseInt(document.getElementById('bookStock').value),
                isbn: document.getElementById('bookISBN').value,
                category: document.getElementById('bookCategory').value,
                desc: document.getElementById('bookDesc').value
            };

            books.unshift(newBook);
            saveBooks();
            displayStockTable();
            updateStats();
            
            // Reset form
            this.reset();
            
            showNotification('✅ Buku baru berhasil ditambahkan!', 'success');
        });

        // Edit Stock
        function editStock(bookId) {
            const book = books.find(b => b.id === bookId);
            document.getElementById('editBookId').value = book.id;
            document.getElementById('editBookTitle').value = book.title;
            document.getElementById('editBookStock').value = book.stock;
            document.getElementById('editBookPrice').value = book.price;
            document.getElementById('editStockModal').style.display = 'block';
        }

        // Update Stock
        document.getElementById('editStockForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const bookId = parseInt(document.getElementById('editBookId').value);
            const book = books.find(b => b.id === bookId);
            
            book.stock = parseInt(document.getElementById('editBookStock').value);
            book.price = parseInt(document.getElementById('editBookPrice').value);
            
            saveBooks();
            displayStockTable();
            updateStats();
            closeModal('editStockModal');
            showNotification('✅ Stok berhasil diupdate!', 'success');
        });

        // Delete Book
        function deleteBook(bookId) {
            if (confirm('Hapus buku ini?')) {
                books = books.filter(b => b.id !== bookId);
                saveBooks();
                displayStockTable();
                updateStats();
                showNotification('🗑️ Buku dihapus!', 'warning');
            }
        }

        // Search
        function setupSearch() {
            document.getElementById('searchStock').addEventListener('input', function() {
                const query = this.value.toLowerCase();
                const filtered = books.filter(book => 
                    book.title.toLowerCase().includes(query) ||
                    book.author.toLowerCase().includes(query) ||
                    book.category.toLowerCase().includes(query)
                );
                displayStockTable(filtered);
            });
        }

        // Modal Functions
        function openAddBookModal() {
            document.getElementById('addBookForm').scrollIntoView({ behavior: 'smooth' });
        }

        function closeModal(modalId) {
            document.getElementById(modalId).style.display = 'none';
        }

        // Export Excel (CSV)
        function exportStock() {
            let csv = 'No,Judul,Penulis,Harga,Stok,Status,Kategori\n';
            books.forEach((book, index) => {
                const status = book.stock === 0 ? 'HABIS' : book.stock <= 5 ? 'RENDAH' : 'OK';
                csv += `${index+1},"${book.title}","${book.author}",${book.price},${book.stock},"${status}","${book.category}"\n`;
            });
            
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `stok-buku-${new Date().toISOString().split('T')[0]}.csv`;
            a.click();
            showNotification('📊 Stok berhasil diexport!', 'success');
        }

        // Clear Out of Stock
        function clearLowStock() {
            const outOfStock = books.filter(b => b.stock === 0);
            if (outOfStock.length === 0) {
                showNotification('Tidak ada stok habis!', 'warning');
                return;
            }
            
            if (confirm(`Hapus ${outOfStock.length} buku stok 0?`)) {
                books = books.filter(b => b.stock > 0);
                saveBooks();
                displayStockTable();
                updateStats();
                showNotification('🗑️ Stok habis dibersihkan!', 'success');
            }
        }

        // Notification
        function showNotification(message, type) {
            const notification = document.getElementById('notification');
            notification.textContent = message;
            notification.className = `notification ${type} show`;
            setTimeout(() => notification.classList.remove('show'), 4000);
        }

        // Format Rupiah
        function formatRupiah(angka) {
            return new Intl.NumberFormat('id-ID', {
                style: 'currency',
                currency: 'IDR',
                minimumFractionDigits: 0
            }).format(angka);
        }
    </script>
</body>
</html>
