<DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laporan Penjualan - Toko Buku</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #4CAF50 0%, #45a049 50%, #2E7D32 100%);
            min-height: 100vh;
            color: #333;
            padding: 20px;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            background: rgba(255, 255, 255, 0.98);
            padding: 30px 40px;
            border-radius: 25px;
            text-align: center;
            margin-bottom: 30px;
            box-shadow: 0 15px 50px rgba(0,0,0,0.15);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.3);
        }

        .header h1 {
            color: #2E7D32;
            font-size: 3em;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }

        .header-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 25px;
            margin-top: 25px;
        }

        .stat-card {
            background: linear-gradient(135deg, rgba(255,255,255,0.9), rgba(255,255,255,0.7));
            padding: 25px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 35px rgba(0,0,0,0.1);
            backdrop-filter: blur(15px);
            transition: all 0.3s ease;
            border: 1px solid rgba(255,255,255,0.4);
        }

        .stat-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
        }

        .stat-number {
            font-size: 2.8em;
            font-weight: bold;
            background: linear-gradient(135deg, #4CAF50, #45a049);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }

        /* Filter Section */
        .filter-section {
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 25px;
            margin-bottom: 30px;
            box-shadow: 0 12px 40px rgba(0,0,0,0.1);
            backdrop-filter: blur(15px);
        }

        .filter-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            align-items: end;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            font-weight: 600;
            color: #2E7D32;
            margin-bottom: 8px;
            font-size: 1em;
        }

        .form-group input,
        .form-group select {
            padding: 15px 20px;
            border: 2px solid #e8f5e8;
            border-radius: 15px;
            font-size: 16px;
            transition: all 0.3s ease;
            background: rgba(255,255,255,0.8);
            backdrop-filter: blur(10px);
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #4CAF50;
            box-shadow: 0 0 0 4px rgba(76, 175, 80, 0.15);
        }

        .btn {
            padding: 15px 30px;
            border: none;
            border-radius: 15px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #4CAF50, #45a049);
            color: white;
            box-shadow: 0 6px 20px rgba(76, 175, 80, 0.3);
        }

        .btn-success {
            background: linear-gradient(135deg, #28a745, #20c997);
            color: white;
        }

        .btn-warning {
            background: linear-gradient(135deg, #ffc107, #e0a800);
            color: #333;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(0,0,0,0.2);
        }

        /* Charts Section */
        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(500px, 1fr));
            gap: 30px;
            margin-bottom: 30px;
        }

        .chart-card {
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 25px;
            box-shadow: 0 15px 45px rgba(0,0,0,0.1);
            backdrop-filter: blur(15px);
        }

        .chart-card h3 {
            color: #2E7D32;
            margin-bottom: 25px;
            font-size: 1.5em;
            text-align: center;
        }

        .chart-container {
            position: relative;
            height: 350px;
        }

        /* Transactions Table */
        .table-section {
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 25px;
            box-shadow: 0 15px 45px rgba(0,0,0,0.1);
            backdrop-filter: blur(15px);
        }

        .table-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            flex-wrap: wrap;
            gap: 15px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 35px rgba(0,0,0,0.1);
        }

        th {
            background: linear-gradient(135deg, #4CAF50, #45a049);
            color: white;
            padding: 20px;
            text-align: left;
            font-weight: 600;
            font-size: 1em;
        }

        td {
            padding: 18px 20px;
            border-bottom: 1px solid #f0f0f0;
        }

        tr:hover {
            background: #f8f9fa;
            transform: scale(1.01);
        }

        .total-row {
            background: linear-gradient(135deg, #FF9800, #F57C00) !important;
            color: white;
            font-weight: bold;
            font-size: 1.2em;
        }

        /* Responsive */
        @media (max-width: 1200px) {
            .charts-grid { grid-template-columns: 1fr; }
        }

        @media (max-width: 768px) {
            .filter-grid { grid-template-columns: 1fr; }
            .header-stats { grid-template-columns: repeat(2, 1fr); }
            .table-header { flex-direction: column; align-items: stretch; }
        }

        /* Notification */
        .notification {
            position: fixed;
            top: 30px;
            right: 30px;
            padding: 20px 30px;
            border-radius: 15px;
            color: white;
            font-weight: 600;
            transform: translateX(400px);
            transition: transform 0.4s ease;
            z-index: 1001;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }

        .notification.show {
            transform: translateX(0);
        }

        .notification.success { background: linear-gradient(135deg, #28a745, #20c997); }
        .notification.info { background: linear-gradient(135deg, #17a2b8, #138496); }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>📊 Laporan Penjualan</h1>
            <p>Sistem Analitik Lengkap Toko Buku Kita</p>
            
            <div class="header-stats" id="headerStats">
                <!-- Stats loaded by JS -->
            </div>
        </div>

        <!-- Filters -->
        <div class="filter-section">
            <h2 style="color: #2E7D32; margin-bottom: 25px;">🔍 Filter Laporan</h2>
            <div class="filter-grid">
                <div class="form-group">
                    <label>📅 Tanggal Mulai</label>
                    <input type="date" id="dateStart">
                </div>
                <div class="form-group">
                    <label>📅 Tanggal Akhir</label>
                    <input type="date" id="dateEnd">
                </div>
                <div class="form-group">
                    <label>👤 Pelanggan</label>
                    <input type="text" id="customerFilter" placeholder="Cari nama pelanggan...">
                </div>
                <div class="form-group">
                    <label>💰 Min Total</label>
                    <input type="number" id="minTotal" placeholder="0">
                </div>
                <div class="form-group">
                    <label>📊 Tipe Laporan</label>
                    <select id="reportType">
                        <option value="all">Semua Transaksi</option>
                        <option value="daily">Harian</option>
                        <option value="weekly">Mingguan</option>
                        <option value="monthly">Bulanan</option>
                    </select>
                </div>
                <div style="display: flex; gap: 15px; flex-wrap: wrap;">
                    <button class="btn btn-primary" onclick="filterReport()">🔄 FILTER</button>
                    <button class="btn btn-success" onclick="exportReport()">📤 EXPORT EXCEL</button>
                    <button class="btn btn-warning" onclick="printReport()">🖨️ CETAK</button>
                </div>
            </div>
        </div>

        <!-- Charts -->
        <div class="charts-grid">
            <div class="chart-card">
                <h3>📈 Penjualan Harian</h3>
                <div class="chart-container">
                    <canvas id="dailyChart"></canvas>
                </div>
            </div>
            <div class="chart-card">
                <h3>💰 Pendapatan Bulanan</h3>
                <div class="chart-container">
                    <canvas id="monthlyChart"></canvas>
                </div>
            </div>
            <div class="chart-card">
                <h3>📚 Buku Terlaris</h3>
                <div class="chart-container">
                    <canvas id="topBooksChart"></canvas>
                </div>
            </div>
            <div class="chart-card">
                <h3>💳 Metode Pembayaran</h3>
                <div class="chart-container">
                    <canvas id="paymentChart"></canvas>
                </div>
            </div>
        </div>

        <!-- Transactions Table -->
        <div class="table-section">
            <div class="table-header">
                <h2 style="color: #2E7D32;">📋 Daftar Transaksi</h2>
                <div id="tableStats" style="font-size: 1.2em; font-weight: 600;"></div>
            </div>
            <div style="overflow-x: auto;">
                <table id="transactionsTable">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Tanggal</th>
                            <th>Pelanggan</th>
                            <th>Items</th>
                            <th>Total</th>
                            <th>Bayar</th>
                            <th>Kembali</th>
                            <th>Metode</th>
                            <th>Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="transactionsTableBody">
                        <!-- Data loaded by JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Notification -->
    <div id="notification" class="notification"></div>

    <script>
        // Load data
        let transactions = JSON.parse(localStorage.getItem('transactions')) || [];
        let books = JSON.parse(localStorage.getItem('books')) || [];
        let filteredTransactions = [...transactions];

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            // Set default date range (last 30 days)
            const endDate = new Date();
            const startDate = new Date();
            startDate.setDate(endDate.getDate() - 30);
            
            document.getElementById('dateStart').value = startDate.toISOString().split('T')[0];
            document.getElementById('dateEnd').value = endDate.toISOString().split('T')[0];
            
            updateHeaderStats();
            renderCharts();
            displayTransactions();
            setupFilters();
        });

        // Header Stats
        function updateHeaderStats() {
            const totalRevenue = filteredTransactions.reduce((sum, t) => sum + t.total, 0);
            const totalTransactions = filteredTransactions.length;
            const avgTransaction = totalRevenue / totalTransactions || 0;
            const totalItems = filteredTransactions.reduce((sum, t) => sum + t.items.reduce((s, i) => s + i.quantity, 0), 0);

            document.getElementById('headerStats').innerHTML = `
                <div class="stat-card">
                    <div class="stat-number">${formatRupiah(totalRevenue)}</div>
                    <div>Total Pendapatan</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number">${totalTransactions}</div>
                    <div>Transaksi</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number">${totalItems}</div>
                    <div>Buku Terjual</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number">${formatRupiah(avgTransaction)}</div>
                    <div>Rata-rata/Transaksi</div>
                </div>
            `;
        }

        // Charts
        let dailyChart, monthlyChart, topBooksChart, paymentChart;

        function renderCharts() {
            const ctx1 = document.getElementById('dailyChart').getContext('2d');
            const ctx2 = document.getElementById('monthlyChart').getContext('2d');
            const ctx3 = document.getElementById('topBooksChart').getContext('2d');
            const ctx4 = document.getElementById('paymentChart').getContext('2d');

            // Daily Sales (last 7 days)
            const last7Days = {};
            const now = new Date();
            for (let i = 6; i >= 0; i--) {
                const date = new Date(now);
                date.setDate(date.getDate() - i);
                last7Days[date.toLocaleDateString('id-ID')] = 0;
            }
            
            filteredTransactions.forEach(t => {
                const date = new Date(t.date).toLocaleDateString('id-ID');
                if (last7Days[date] !== undefined) {
                    last7Days[date] += t.total;
                }
            });

            dailyChart = new Chart(ctx1, {
                type: 'line',
                data: {
                    labels: Object.keys(last7Days),
                    datasets: [{
                        label: 'Penjualan (Rp)',
                        data: Object.values(last7Days),
                        borderColor: '#4CAF50',
                        backgroundColor: 'rgba(76, 175, 80, 0.1)',
                        tension: 0.4,
                        fill: true
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false }
            });

            // Monthly (last 12 months)
            const months = ['Jan', 'Feb', 'Mar', 'Apr', 'Mei', 'Jun', 'Jul', 'Ags', 'Sep', 'Okt', 'Nov', 'Des'];
            const monthlyData = new Array(12).fill(0);
            
            filteredTransactions.forEach(t => {
                const month = new Date(t.date).getMonth();
                monthlyData[month] += t.total;
            });

            monthlyChart = new Chart(ctx2, {
                type: 'bar',
                data: {
                    labels: months,
                    datasets: [{
                        label: 'Pendapatan (Rp)',
                        data: monthlyData,
                        backgroundColor: '#4CAF50'
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false }
            });

            // Top Books
            const bookSales = {};
            filteredTransactions.forEach(t => {
                t.items.forEach(item => {
                    bookSales[item.title] = (bookSales[item.title] || 0) + item.quantity;
                });
            });

            const topBooks = Object.entries(bookSales)
                .sort(([,a], [,b]) => b - a)
                .slice(0, 7)
                .map(([title, qty]) => ({ title: title.slice(0, 20) + '...', qty }));

            topBooksChart = new Chart(ctx3, {
                type: 'doughnut',
                data: {
                    labels: topBooks.map(b => b.title),
                    datasets: [{
                        data: topBooks.map(b => b.qty),
                        backgroundColor: ['#FF6384', '#36A2EB', '#FFCE56', '#4BC0C0', '#9966FF', '#FF9F40', '#FF6384']
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false }
            });

            // Payment Methods
            const paymentData = { cash: 0, qris: 0, transfer: 0 };
            filteredTransactions.forEach(t => {
                paymentData[t.payment.method]++;
            });

            paymentChart = new Chart(ctx4, {
                type: 'pie',
                data: {
                    labels: ['💵 Cash', '💳 QRIS', '🏦 Transfer'],
                    datasets: [{
                        data: [paymentData.cash, paymentData.qris, paymentData.transfer],
                        backgroundColor: ['#28a745', '#007bff', '#ffc107']
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false }
            });
        }

        // Transactions Table
        function displayTransactions() {
            const tbody = document.getElementById('transactionsTableBody');
            const totalRevenue = filteredTransactions.reduce((sum, t) => sum + t.total, 0);
            
            tbody.innerHTML = filteredTransactions.map((t, index) => `
                <tr>
                    <td>#${t.id.toString().padStart(4, '0')}</td>
                    <td>${new Date(t.date).toLocaleDateString('id-ID')} ${new Date(t.date).toLocaleTimeString('id-ID', {hour: '2-digit', minute: '2-digit'})}</td>
                    <td>${t.customer.name}${t.customer.phone ? `<br><small>📱 ${t.customer.phone}</small>` : ''}</td>
                    <td>${t.items.reduce((sum, i) => sum + i.quantity, 0)} item</td>
                    <td>${formatRupiah(t.total)}</td>
                    <td>${formatRupiah(t.payment.cash || t.total)}</td>
                    <td>${t.payment.change > 0 ? formatRupiah(t.payment.change) : '-'}</td>
                    <td>
                        <span style="padding: 6px 12px; border-radius: 20px; background: ${t.payment.method === 'cash' ? '#d4edda' : t.payment.method === 'qris' ? '#cce5ff' : '#fff3cd'}; color: ${t.payment.method === 'cash' ? '#155724' : t.payment.method === 'qris' ? '#004085' : '#856404'}">
                            ${t.payment.method === 'cash' ? '💵 Cash' : t.payment.method === 'qris' ? '💳 QRIS' : '🏦 Transfer'}
                        </span>
                    </td>
                    <td>
                        <button class="btn btn-primary" onclick="viewDetail(${t.id})" style="padding: 8px 15px; font-size: 12px;">Detail</button>
                    </td>
                </tr>
            `).join('') + `
                <tr class="total-row">
                    <td colspan="4"><strong>TOTAL</strong></td>
                    <td><strong>${formatRupiah(totalRevenue)}</strong></td>
                    <td colspan="4"></td>
                </tr>
            `;

            document.getElementById('tableStats').textContent = `Menampilkan ${filteredTransactions.length} transaksi | Total: ${formatRupiah(totalRevenue)}`;
            updateHeaderStats();
        }

        // Filters
        function setupFilters() {
            document.getElementById('dateStart').addEventListener('change', filterReport);
            document.getElementById('dateEnd').addEventListener('change', filterReport);
            document.getElementById('customerFilter').addEventListener('input', filterReport);
            document.getElementById('minTotal').addEventListener('input', filterReport);
        }

        function filterReport() {
            const startDate = new Date(document.getElementById('dateStart').value);
            const endDate = new Date(document.getElementById('dateEnd').value);
            const customerFilter = document.getElementById('customerFilter').value.toLowerCase();
            const minTotal = parseInt(document.getElementById('minTotal').value) || 0;

            filteredTransactions = transactions.filter(t => {
                const transDate = new Date(t.date);
                const matchesDate = transDate >= startDate && transDate <= endDate;
                const matchesCustomer = t.customer.name.toLowerCase().includes(customerFilter);
                const matchesTotal = t.total >= minTotal;
                return matchesDate && matchesCustomer && matchesTotal;
            });

            displayTransactions();
            renderCharts(); // Update charts
            showNotification('✅ Filter diterapkan!', 'success');
        }

        // Export
        function exportReport() {
            let csv = 'ID,Tanggal,Pelanggan,Items,Total,Bayar,Kembali,Metode\n';
            filteredTransactions.forEach(t => {
                csv += `"#${t.id}",${t.date},"${t.customer.name}",${t.items.reduce((s,i)=>s+i.quantity,0)},${t.total},${t.payment.cash || t.total},${t.payment.change || 0},"${t.payment.method}"\n`;
            });
            csv += `\nTOTAL,,-,${filteredTransactions.reduce((s,t)=>s+t.items.reduce((ss,i)=>ss+i.quantity,0),0)},${filteredTransactions.reduce((s,t)=>s+t.total,0)},,`;

            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `laporan-penjualan-${new Date().toISOString().split('T')[0]}.csv`;
            link.click();
            showNotification('📤 Laporan diexport!', 'success');
        }

        function printReport() {
            window.print();
        }

        function viewDetail(id) {
            const trans = transactions.find(t => t.id === id);
            if (trans) {
                let detail = `📋 DETAIL TRANSAKSI #${trans.id}\n\n`;
                detail += `Tanggal: ${trans.date}\n`;
                detail += `Pelanggan: ${trans.customer.name}\n`;
                detail += `Total: ${formatRupiah(trans.total)}\n\n`;
                detail += 'ITEMS:\n';
                trans.items.forEach(item => {
                    detail += `- ${item.title} x${item.quantity}: ${formatRupiah(item.price * item.quantity)}\n`;
                });
                alert(detail);
            }
        }

        // Format
        function formatRupiah(angka) {
            return new Intl.NumberFormat('id-ID', {
                style: 'currency',
                currency: 'IDR',
                minimumFractionDigits: 0
            }).format(angka);
        }

        // Notification
        function showNotification(message, type) {
            const notif = document.getElementById('notification');
            notif.textContent = message;
            notif.className = `notification ${type} show`;
            setTimeout(() => notif.classList.remove('show'), 3000);
        }
    </script>
</body>
</html>
